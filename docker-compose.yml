services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:docker
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: slotwhiz
      POSTGRES_PASSWORD: slotwhiz
      POSTGRES_DB: slotwhiz
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
