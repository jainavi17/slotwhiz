name: Build, Push, Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/jainavi17/slotwhiz
  TAG: ${{ github.sha }}

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy app to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK is not set. Skipping app deployment."
            exit 0
          fi

          echo "Triggering SlotWhiz app deployment..."
          ENCODED_IMAGE=$(printf "%s" "${IMAGE_NAME}:${TAG}" | jq -s -R -r @uri)
          curl -s -X POST \
            "${RENDER_DEPLOY_HOOK}&imgURL=${ENCODED_IMAGE}" \
            -H "Accept: application/json"

      - name: Deploy worker to Render
        env:
          RENDER_WORKER_DEPLOY_HOOK: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_WORKER_DEPLOY_HOOK" ]; then
            echo "RENDER_WORKER_DEPLOY_HOOK is not set. Skipping worker deployment."
            exit 0
          fi

          echo "Triggering SlotWhiz worker deployment..."
          ENCODED_IMAGE=$(printf "%s" "${IMAGE_NAME}:${TAG}" | jq -s -R -r @uri)
          curl -s -X POST \
            "${RENDER_WORKER_DEPLOY_HOOK}&imgURL=${ENCODED_IMAGE}" \
            -H "Accept: application/json"
